<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saenco — Calendario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <!-- TOP BAR -->
    <div class="topbar">
    <div class="topbar-left">
        <span><span class="topbar-dot"></span>Sistema operativo</span>
    </div>
    <div class="topbar-right">
        <span id="clock" style="font-family: var(--mono); font-size: 11px; opacity: 0.8;"></span>
    </div>
    </div>

    <!-- HEADER -->
    <header>
    <div class="logo">
        <span class="logo-mark">Saenco</span>
        <div class="logo-divider"></div>
        <span class="logo-sub">Portale Interno</span>
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="da-fare.html">Da fare</a>
        <a href="software.html">Software</a>
        <a href="https://sgheb-not-available.github.io/Clienti-Padova/">Clienti</a>
        <a href="documenti.html">Documenti</a>
        <a href="calendario.html" class="active">Calendario</a>
    </nav>
    <div class="header-right">
        <div class="avatar" title="Profilo utente">Tu</div>
    </div>
    </header>

    <!-- MAIN -->
    <div class="main" style="flex: 1;">
    <div class="section-label">Calendario eventi</div>

    <!-- CALENDAR HEADER -->
    <div class="card" style="margin-bottom: 1.5rem;">
        <div class="card-header">
        <span class="card-title">Calendario</span>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="prev-month" class="button button-secondary" style="padding: 0.25rem 0.5rem;">‹</button>
            <span id="current-month" style="font-family: var(--serif); font-size: 18px; font-weight: 600;"></span>
            <button id="next-month" class="button button-secondary" style="padding: 0.25rem 0.5rem;">›</button>
        </div>
        </div>
        <div class="card-body">
        <!-- CALENDAR GRID -->
        <div id="calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 1rem;">
            <!-- Days will be generated here -->
        </div>
        </div>
    </div>

    <!-- ADD EVENT FORM -->
    <div class="card">
        <div class="card-header">
        <span class="card-title">Aggiungi evento</span>
        </div>
        <div class="card-body">
        <form id="event-form" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 1rem; align-items: end;">
            <div>
            <label for="event-date" style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 0.5rem;">Data</label>
            <input type="date" id="event-date" required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;">
            </div>
            <div>
            <label for="event-title" style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 0.5rem;">Titolo</label>
            <input type="text" id="event-title" placeholder="Titolo dell'evento..." required style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;">
            </div>
            <div>
            <label for="event-description" style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 0.5rem;">Descrizione</label>
            <input type="text" id="event-description" placeholder="Breve descrizione..." style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px;">
            </div>
            <button type="submit" class="button">Aggiungi evento</button>
        </form>
        </div>
    </div>

    </div>

    <!-- FOOTER -->
    <footer>
    <span>Saenco S.r.l. &mdash; Uso interno riservato</span>
    <span style="display: flex; gap: 1.5rem;">
        <a href="#">Sviluppato da Riccardo Dinoi</a>
        <span style="opacity: 0.5;">&copy; <span id="year"></span> Saenco S.r.l.</span>
    </span>
    </footer>

    <!-- EVENT DETAILS MODAL -->
    <div id="event-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--surface); padding: 2rem; border-radius: var(--radius-lg); border: 1px solid var(--border); max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 id="modal-title" style="margin: 0; font-size: 18px; color: var(--text-primary);">Dettagli evento</h3>
                <button id="close-modal" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">×</button>
            </div>
            <div id="modal-content">
                <!-- Event details will be shown here -->
            </div>
            <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end;">
                <button id="edit-event" class="button button-secondary">Modifica</button>
                <button id="delete-event" class="button" style="background: var(--red); border-color: var(--red);">Elimina</button>
            </div>
        </div>
    </div>

    <script src="js/calendario.js"></script>
</body>
</html>
